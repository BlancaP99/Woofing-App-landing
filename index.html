<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Woofing App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
    <style>

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --brand: #5c3277;
            --bg: #F8F9FA;
            --font: 'Instrument Sans', sans-serif;
            --font-display: 'Playfair Display', Georgia, serif;
        }

        html, body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--brand);
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ── */
        .header {
            width: 100%;
            padding: 28px 56px;
            background-color: var(--bg);
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-img {
            height: 56px;
            width: auto;
            object-fit: contain;
        }

        .nav__menu {
            position: absolute;
            right: 0;
        }

        .nav__link {
            font-family: var(--font);
            font-weight: 400;
            font-size: 14px;
            color: var(--brand);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

            .nav__link:hover {
                opacity: 0.55;
            }

        /* ── HERO ── */
        .hero {
            display: flex;
            align-items: center;
            min-height: calc(100vh - 112px);
            padding: 32px 0 56px;
        }

        .hero__half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mockup-img {
            height: 880px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .hero__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 32px;
            max-width: 460px;
        }

        .icon-img {
            height: 250px;
            width: 100%;
            object-fit: contain;
        }

        .hero__tagline {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: clamp(25px, 3vw, 43px);
            line-height: 1.2;
            color: var(--brand);
        }

        /* ── CTA BUTTON ── */
        .btn-cta {
            font-family: var(--font);
            font-weight: 500;
            font-size: 15px;
            color: #fff;
            background-color: var(--brand);
            border: none;
            border-radius: 5px;
            padding: 15px 36px;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: opacity 0.2s, transform 0.15s;
        }

            .btn-cta:hover {
                opacity: 0.85;
                transform: translateY(-1px);
            }

        /* ── FOOTER ── */
        .footer {
            background-color: var(--bg);
            border-top: 1px solid rgba(92, 50, 119, 0.1);
            padding: 64px 48px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            text-align: center;
        }

        .footer__title {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: clamp(20px, 2vw, 28px);
            color: var(--brand);
            line-height: 1.3;
        }

        .footer__form {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }

        .footer__input {
            font-family: var(--font);
            font-size: 15px;
            color: var(--brand);
            background: #fff;
            border: 1.5px solid rgba(92, 50, 119, 0.2);
            border-radius: 10px;
            padding: 13px 18px;
            outline: none;
            transition: border-color 0.2s;
            flex: 1;
        }

            .footer__input::placeholder {
                color: rgba(92, 50, 119, 0.35);
            }

            .footer__input:focus {
                border-color: var(--brand);
            }

        .footer__submit {
            font-family: var(--font);
            font-weight: 500;
            font-size: 15px;
            color: #fff;
            background: var(--brand);
            border: none;
            border-radius: 5px;
            padding: 13px 28px;
            cursor: pointer;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s;
        }

            .footer__submit:hover {
                opacity: 0.85;
                transform: translateY(-1px);
            }

        .footer__message {
            font-family: var(--font);
            font-size: 13px;
            min-height: 18px;
            font-weight: 500;
        }

        .footer__copy {
            font-family: var(--font);
            font-size: 12px;
            color: var(--brand);
            opacity: 0.35;
            margin-top: 12px;
            letter-spacing: 0.02em;
        }

        /* ── POPUP ── */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(92, 50, 119, 0.15);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 100;
        }

            .popup-overlay.active {
                opacity: 1;
                pointer-events: all;
            }

        .popup {
            background: #fff;
            border-radius: 20px;
            padding: 44px 40px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 24px 64px rgba(92, 50, 119, 0.15);
        }

        .popup-overlay.active .popup {
            transform: translateY(0) scale(1);
        }

        .popup__close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--brand);
            cursor: pointer;
            opacity: 0.45;
            line-height: 1;
            transition: opacity 0.2s;
        }

            .popup__close:hover {
                opacity: 1;
            }

        .popup__title {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 24px;
            color: var(--brand);
            margin-bottom: 8px;
        }

        .popup__subtitle {
            font-family: var(--font);
            font-weight: 400;
            font-size: 14px;
            color: var(--brand);
            opacity: 0.6;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .popup__form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .popup__input {
            font-family: var(--font);
            font-size: 15px;
            color: var(--brand);
            background: var(--bg);
            border: 1.5px solid rgba(92, 50, 119, 0.2);
            border-radius: 10px;
            padding: 13px 16px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

            .popup__input::placeholder {
                color: rgba(92, 50, 119, 0.35);
            }

            .popup__input:focus {
                border-color: var(--brand);
            }

        .popup__submit {
            font-family: var(--font);
            font-weight: 500;
            font-size: 15px;
            color: #fff;
            background: var(--brand);
            border: none;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.02em;
        }

            .popup__submit:hover {
                opacity: 0.85;
                transform: translateY(-1px);
            }

        .popup__message {
            font-family: var(--font);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
            font-weight: 500;
        }

        .popup__submit:disabled,
        .footer__submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header {
                padding: 20px 24px;
            }

            .hero {
                flex-direction: column;
                padding: 32px 24px 48px;
                min-height: auto;
            }

            .hero__half {
                width: 100%;
            }

            .mockup-img {
                height: 400px;
            }

            .footer {
                padding: 48px 24px 40px;
            }

            .footer__form {
                flex-direction: column;
            }

            .popup {
                margin: 24px;
                padding: 36px 28px 32px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <nav class="nav">
            <div>
                <a href="index.html">
                    <img src="IMAGES/LOGO_.png" alt="Logo" class="logo-img" />
                </a>
            </div>
            <div class="nav__menu">
                <a href="contacto.html" class="nav__link">Contacto</a>
            </div>
        </nav>
    </header>

    <!-- HERO -->
    <main class="hero">
        <div class="hero__half">
            <img src="IMAGES/MOCKUP_IPHONE_2.png" alt="App Mockup" class="mockup-img" />
        </div>
        <div class="hero__half">
            <div class="hero__content">
                <img src="IMAGES/ICONO.png" alt="Icono" class="icon-img" />
                <p class="hero__tagline">Todo lo que tu mascota necesita,<br />en un solo lugar.</p>
                <button class="btn-cta" id="openPopup" type="button">Acceso Anticipado</button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer" id="footer">
        <p class="footer__title">Regístrate para recibir noticias y actualizaciones.</p>

        <form class="footer__form" id="footerForm">
            <input type="email"
                   class="footer__input"
                   placeholder="tu@email.com"
                   id="footerEmail"
                   name="email" />
            <button class="footer__submit" id="footerSubmit" type="submit">Suscribirme</button>
        </form>

        <p class="footer__message" id="footerMessage"></p>
        <p class="footer__copy">© 2025 Woofing App. Todos los derechos reservados.</p>
    </footer>

    <!-- POPUP -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <button class="popup__close" id="closePopup" type="button">&times;</button>
            <h2 class="popup__title">Acceso Anticipado</h2>
            <p class="popup__subtitle">Déjanos tu email y te avisamos cuando estemos listos.</p>

            <form class="popup__form" id="popupForm">
                <input type="email"
                       class="popup__input"
                       placeholder="tu@email.com"
                       id="emailInput"
                       name="email" />
                <button class="popup__submit" id="submitEmail" type="submit">Apuntarme</button>
            </form>

            <p class="popup__message" id="popupMessage"></p>
        </div>
    </div>

    <script>
        const FORMSPREE_ENDPOINT = "https://formspree.io/f/xojkooan";

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        async function sendToFormspree(data) {
            const response = await fetch(FORMSPREE_ENDPOINT, {
                method: "POST",
                headers: {
                    "Accept": "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            return response;
        }

        // ── POPUP ──
        const overlay = document.getElementById("popupOverlay");
        const popupForm = document.getElementById("popupForm");
        const emailInput = document.getElementById("emailInput");
        const popupMsg = document.getElementById("popupMessage");
        const submitEmailBtn = document.getElementById("submitEmail");

        document.getElementById("openPopup").addEventListener("click", () => {
            overlay.classList.add("active");
            emailInput.focus();
        });

        function closePopup() {
            overlay.classList.remove("active");
            popupMsg.textContent = "";
            emailInput.value = "";
            submitEmailBtn.disabled = false;
            submitEmailBtn.textContent = "Apuntarme";
        }

        document.getElementById("closePopup").addEventListener("click", closePopup);

        overlay.addEventListener("click", (e) => {
            if (e.target === overlay) {
                closePopup();
            }
        });

        popupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email || !isValidEmail(email)) {
                popupMsg.textContent = "Por favor, introduce un email válido.";
                popupMsg.style.color = "#c00";
                return;
            }

            submitEmailBtn.disabled = true;
            submitEmailBtn.textContent = "Enviando...";
            popupMsg.textContent = "";

            try {
                const response = await sendToFormspree({
                    email,
                    _subject: "Nuevo acceso anticipado desde la web de Woofing",
                    form_type: "popup_acceso_anticipado"
                });

                if (response.ok) {
                    popupMsg.textContent = "¡Genial! Te avisaremos pronto.";
                    popupMsg.style.color = "#5c3277";
                    popupForm.reset();

                    setTimeout(() => {
                        closePopup();
                    }, 1800);
                } else {
                    popupMsg.textContent = "No se pudo enviar. Inténtalo de nuevo.";
                    popupMsg.style.color = "#c00";
                }
            } catch (error) {
                popupMsg.textContent = "Ha ocurrido un error al enviar el formulario.";
                popupMsg.style.color = "#c00";
            } finally {
                submitEmailBtn.disabled = false;
                submitEmailBtn.textContent = "Apuntarme";
            }
        });

        // ── FOOTER FORM ──
        const footerForm = document.getElementById("footerForm");
        const footerEmail = document.getElementById("footerEmail");
        const footerMsg = document.getElementById("footerMessage");
        const footerSubmit = document.getElementById("footerSubmit");

        footerForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = footerEmail.value.trim();

            if (!email || !isValidEmail(email)) {
                footerMsg.textContent = "Por favor, introduce un email válido.";
                footerMsg.style.color = "#c00";
                return;
            }

            footerSubmit.disabled = true;
            footerSubmit.textContent = "Enviando...";
            footerMsg.textContent = "";

            try {
                const response = await sendToFormspree({
                    email,
                    _subject: "Nueva suscripción desde la web de Woofing",
                    form_type: "newsletter_footer"
                });

                if (response.ok) {
                    footerMsg.textContent = "¡Gracias! Te mantendremos al tanto.";
                    footerMsg.style.color = "#5c3277";
                    footerForm.reset();
                } else {
                    footerMsg.textContent = "No se pudo completar la suscripción. Inténtalo de nuevo.";
                    footerMsg.style.color = "#c00";
                }
            } catch (error) {
                footerMsg.textContent = "Ha ocurrido un error al enviar la suscripción.";
                footerMsg.style.color = "#c00";
            } finally {
                footerSubmit.disabled = false;
                footerSubmit.textContent = "Suscribirme";
            }
        });
    </script>
</body>
</html>
